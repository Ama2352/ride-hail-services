# =============================================================================
# SonarQube Configuration — User Service
# Static code analysis: bugs, code smells, duplication, maintainability
# =============================================================================

sonar.projectKey=uitgo-user-service
sonar.projectName=User Service
sonar.projectVersion=1.0

# Source code location (relative to this file)
sonar.sources=.
sonar.exclusions=**/*_test.go,**/vendor/**, main.go

# Test files (for coverage mapping)
sonar.tests=.
sonar.test.inclusions=**/*_test.go

# Go test coverage report (generated during Test stage)
sonar.go.coverage.reportPaths=coverage.out

# Exclude main_test.go from analysis
sonar.coverage.exclusions=main.go

# Block pipeline if quality gate fails
sonar.qualitygate.wait=true

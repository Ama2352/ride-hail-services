# =============================================================================
# SonarQube Configuration — Notification Service
# Static code analysis: bugs, code smells, duplication, maintainability
# =============================================================================

sonar.projectKey=ama2352_ridehail-notification-service
sonar.projectName=Notification Service
sonar.projectVersion=1.0

# Source code location (relative to this file)
sonar.sources=.
sonar.exclusions=**/*_test.go,**/vendor/**,main.go

# Test files (for coverage mapping)
sonar.tests=.
sonar.test.inclusions=**/*_test.go

# Go test coverage report (generated during Test stage)
sonar.go.coverage.reportPaths=coverage.out

# Exclude main.go from coverage analysis
# main.go contains only bootstrapping code (http.ListenAndServe blocks indefinitely)
# All testable business logic is in server.go
sonar.coverage.exclusions=main.go

# Block pipeline if quality gate fails
sonar.qualitygate.wait=true

# =============================================================================
# SonarQube Configuration — Ride Service (Java/Spring Boot)
# Static code analysis: bugs, code smells, duplication, maintainability
# Coverage: JUnit 5 with Mockito and Spring Test
# =============================================================================

sonar.projectKey=uitgo-ride-service
sonar.projectName=Ride Service
sonar.projectVersion=1.0
sonar.java.source=21
sonar.java.target=21

# Source code location (relative to this file)
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.exclusions=**/configuration/**,**/dto/**
sonar.test.exclusions=**/configuration/**

# Java test coverage report (generated during Test stage via Maven)
sonar.java.coveragePlugin=jacoco
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Coverage threshold: ensure comprehensive testing
sonar.coverage.exclusions=**/config/**,**/entity/**

# Require coverage minimum before merging
sonar.qualitygate.wait=true

# Code smell and bug detection
sonar.java.checkstyle.reportPaths=target/checkstyle-result.xml
